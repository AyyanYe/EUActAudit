name: CodiumAI PR-Agent

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created, edited]

permissions:
  pull-requests: write
  issues: write

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    name: Run PR Agent
    if: ${{ github.event.sender.type != 'Bot' }}
    steps:
      - id: pragent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
          PR_REVIEWER__MODEL: "openrouter/meta-llama/llama-3-8b-instruct:free"
          PR_DESCRIPTION__MODEL: "openrouter/meta-llama/llama-3-8b-instruct:free"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
